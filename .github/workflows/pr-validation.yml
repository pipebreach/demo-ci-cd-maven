name: "PR - Validation Pipeline"

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  checks: write
  contents: read
  pull-requests: read
  security-events: write

jobs:
  ci:
    name: "CI"
    uses: ./.github/workflows/ci.yml

  sast:
    name: "SAST"
    uses: ./.github/workflows/sast.yml

  sca:
    name: "SCA"
    uses: ./.github/workflows/dependency-review.yml

  code-scanning-gate:
    name: "Code Scanning Gate"
    needs: [sast]
    if: needs.sast.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      security-events: read
    steps:
      - name: Wait for published CodeQL result
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SUMMARY_FILE="${GITHUB_STEP_SUMMARY}"
          SCAN_REF="refs/pull/${{ github.event.pull_request.number }}/head"

          for i in $(seq 1 36); do
            RESPONSE=$(gh api graphql -f query='
              query($owner:String!, $repo:String!, $pr:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$pr) {
                    commits(last:1) {
                      nodes {
                        commit {
                          statusCheckRollup {
                            contexts(first:50) {
                              nodes {
                                __typename
                                ... on CheckRun {
                                  name
                                  status
                                  conclusion
                                  detailsUrl
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }' \
              -F owner='${{ github.repository_owner }}' \
              -F repo='${{ github.event.repository.name }}' \
              -F pr='${{ github.event.pull_request.number }}')

            STATUS=$(echo "$RESPONSE" | jq -r '.data.repository.pullRequest.commits.nodes[0].commit.statusCheckRollup.contexts.nodes[] | select(.name=="CodeQL") | .status' | head -1)
            CONCLUSION=$(echo "$RESPONSE" | jq -r '.data.repository.pullRequest.commits.nodes[0].commit.statusCheckRollup.contexts.nodes[] | select(.name=="CodeQL") | .conclusion' | head -1)
            DETAILS_URL=$(echo "$RESPONSE" | jq -r '.data.repository.pullRequest.commits.nodes[0].commit.statusCheckRollup.contexts.nodes[] | select(.name=="CodeQL") | .detailsUrl' | head -1)

            if [ -n "$STATUS" ] && [ "$STATUS" != "null" ]; then
              echo "[${i}/36] CodeQL status=${STATUS} conclusion=${CONCLUSION}"
              if [ "$STATUS" = "COMPLETED" ]; then
                if [ "$CONCLUSION" = "SUCCESS" ]; then
                  cat >> "$SUMMARY_FILE" <<EOF
          ## Code Scanning Gate

          ✅ **CodeQL published a successful result.**

          | Field | Value |
          |---|---|
          | **Status** | ${STATUS} |
          | **Conclusion** | ${CONCLUSION} |
          | **Ref** | \`${SCAN_REF}\` |
          | **Details** | ${DETAILS_URL} |
          EOF
                  exit 0
                fi

                ALERTS=$(gh api \
                  -H "Accept: application/vnd.github+json" \
                  "/repos/${{ github.repository }}/code-scanning/alerts?ref=${SCAN_REF}&tool_name=CodeQL&state=open&per_page=20" \
                  2>/dev/null || echo "[]")

                HIGH_COUNT=$(echo "$ALERTS" | jq '[.[] | select(((.rule.security_severity_level // "") | ascii_downcase) == "high" or ((.rule.security_severity_level // "") | ascii_downcase) == "critical")] | length')
                MEDIUM_COUNT=$(echo "$ALERTS" | jq '[.[] | select(((.rule.security_severity_level // "") | ascii_downcase) == "medium")] | length')
                LOW_COUNT=$(echo "$ALERTS" | jq '[.[] | select(((.rule.security_severity_level // "") | ascii_downcase) == "low")] | length')
                TOP_ALERTS=$(echo "$ALERTS" | jq -r '.[0:5][]? | "- **\(.rule.id)** (\((.rule.security_severity_level // "unknown") | ascii_upcase)) — \(.most_recent_instance.location.path // "unknown"):\(.most_recent_instance.location.start_line // 0)"')

                cat >> "$SUMMARY_FILE" <<EOF
          ## Code Scanning Gate

          ❌ **CodeQL published a blocking result.**

          | Field | Value |
          |---|---|
          | **Status** | ${STATUS} |
          | **Conclusion** | ${CONCLUSION} |
          | **Ref** | \`${SCAN_REF}\` |
          | **High / Critical alerts** | ${HIGH_COUNT} |
          | **Medium alerts** | ${MEDIUM_COUNT} |
          | **Low alerts** | ${LOW_COUNT} |
          | **Details** | ${DETAILS_URL} |

          ### Top open CodeQL alerts
          ${TOP_ALERTS:-"- No detailed alert rows available."}
          EOF

                echo "::error::CodeQL published a blocking result: ${CONCLUSION}."
                exit 1
              fi
            fi

            echo "[${i}/36] CodeQL result not published yet."
            sleep 10
          done

          cat >> "$SUMMARY_FILE" <<EOF
          ## Code Scanning Gate

          ❌ **Timed out waiting for the published CodeQL result.**

          | Field | Value |
          |---|---|
          | **Ref** | \`${SCAN_REF}\` |
          EOF
          echo "::error::Timed out waiting for the published CodeQL result."
          exit 1

  preview-validation:
    name: "Preview, Functional Tests, and DAST"
    needs: [ci, sast, sca, code-scanning-gate]
    if: needs.ci.result == 'success' && needs.sast.result == 'success' && needs.sca.result == 'success' && needs.code-scanning-gate.result == 'success' && github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/preview.yml
    with:
      branch: ${{ github.head_ref }}
    secrets: inherit
