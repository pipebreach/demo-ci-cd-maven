name: "PR - Validation Pipeline"

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  checks: write
  contents: read
  pull-requests: read
  security-events: write

jobs:
  ci:
    name: "CI"
    uses: ./.github/workflows/ci.yml

  sast:
    name: "SAST"
    uses: ./.github/workflows/sast.yml

  sca:
    name: "SCA"
    uses: ./.github/workflows/dependency-review.yml

  code-scanning-gate:
    name: "Code Scanning Gate"
    needs: [sast]
    if: needs.sast.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: read
    steps:
      - name: Wait for CodeQL analysis and evaluate alerts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SCAN_REF="refs/pull/${{ github.event.pull_request.number }}/head"

          for i in $(seq 1 36); do
            ANALYSES=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/code-scanning/analyses?ref=${SCAN_REF}&tool_name=CodeQL&per_page=100")

            COUNT=$(echo "$ANALYSES" | jq 'length')
            if [ "$COUNT" -gt 0 ]; then
              echo "[${i}/36] CodeQL analysis published for ${SCAN_REF}."
              ALERTS=$(gh api \
                -H "Accept: application/vnd.github+json" \
                "/repos/${{ github.repository }}/code-scanning/alerts?ref=${SCAN_REF}&tool_name=CodeQL&state=open&per_page=100")

              HIGH_COUNT=$(echo "$ALERTS" | jq '[.[] | select(((.rule.security_severity_level // "") | ascii_downcase) == "high" or ((.rule.security_severity_level // "") | ascii_downcase) == "critical")] | length')
              TOTAL_COUNT=$(echo "$ALERTS" | jq 'length')

              echo "Open CodeQL alerts: total=${TOTAL_COUNT}, high_or_critical=${HIGH_COUNT}"

              if [ "$HIGH_COUNT" -gt 0 ]; then
                echo "::error::High or critical CodeQL alerts detected for ${SCAN_REF}."
                exit 1
              fi

              exit 0
            fi

            echo "[${i}/36] CodeQL analysis not published yet for ${SCAN_REF}."
            sleep 10
          done

          echo "::error::Timed out waiting for CodeQL code scanning analysis."
          exit 1

  preview-validation:
    name: "Preview, Functional Tests, and DAST"
    needs: [ci, sast, sca, code-scanning-gate]
    if: needs.ci.result == 'success' && needs.sast.result == 'success' && needs.sca.result == 'success' && needs.code-scanning-gate.result == 'success' && github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/preview.yml
    with:
      branch: ${{ github.head_ref }}
    secrets: inherit
