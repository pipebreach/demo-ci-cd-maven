name: "DAST - OWASP ZAP Baseline"

on:
  workflow_call:
    inputs:
      base_url:
        description: "Base URL of the deployed API"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL of the deployed API"
        required: true
        type: string

permissions:
  contents: read

jobs:
  zap-baseline:
    name: "ZAP Baseline Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: ${{ inputs.base_url }}
          allow_issue_writing: false
          fail_action: false
          cmd_options: >-
            -a

      - name: Summarize advisory results
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          report_path = Path("report_json.json")

          if not report_path.exists():
              summary_path.write_text(
                  "## DAST Summary\n\n"
                  "⚠️ ZAP did not produce a JSON report. Review the job logs for details.\n",
                  encoding="utf-8",
              )
              raise SystemExit(1)

          report = json.loads(report_path.read_text(encoding="utf-8"))
          alerts = []
          for site in report.get("site", []):
              alerts.extend(site.get("alerts", []))

          counts = {"High": 0, "Medium": 0, "Low": 0, "Informational": 0}
          risk_names = {"3": "High", "2": "Medium", "1": "Low", "0": "Informational"}

          for alert in alerts:
              risk = risk_names.get(str(alert.get("riskcode")), "Informational")
              counts[risk] = counts.get(risk, 0) + 1

          total = sum(counts.values())
          if counts["High"] > 0:
              status_line = (
                  "❌ DAST policy failed. High severity findings were detected and this check "
                  "must block the merge."
              )
          elif total == 0:
              status_line = "✅ DAST scan completed with no alerts."
          else:
              status_line = (
                  "ℹ️ DAST scan completed. Only Medium/Low/Informational findings were detected, "
                  "so the check remains green."
              )

          summary = (
              "## DAST Summary\n\n"
              f"{status_line}\n\n"
              f"Target: `{os.environ['DAST_TARGET']}`\n\n"
              "| Severity | Alerts |\n"
              "|---|---:|\n"
              f"| High | {counts['High']} |\n"
              f"| Medium | {counts['Medium']} |\n"
              f"| Low | {counts['Low']} |\n"
              f"| Informational | {counts['Informational']} |\n\n"
              "> Policy: High findings fail the workflow. Medium, Low, and Informational "
              "findings are reported but do not fail the check.\n"
          )
          summary_path.write_text(summary, encoding="utf-8")
          raise SystemExit(1 if counts["High"] > 0 else 0)
          PY
        env:
          DAST_TARGET: ${{ inputs.base_url }}
