name: "Main - Validation Pipeline"

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pom.xml"
      - ".devcontainer/**"
      - ".github/workflows/**"
      - ".github/dependabot.yml"

permissions:
  actions: read
  checks: write
  contents: read
  security-events: write

jobs:
  ci:
    name: "CI"
    uses: ./.github/workflows/ci.yml

  sast:
    name: "SAST"
    uses: ./.github/workflows/sast.yml

  sca:
    name: "SCA"
    uses: ./.github/workflows/sca.yml

  code-scanning-gate:
    name: "Code Scanning Gate"
    needs: [sast]
    if: needs.sast.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Wait for published CodeQL result
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in $(seq 1 36); do
            RESPONSE=$(gh api graphql -f query='
              query($owner:String!, $repo:String!, $ref:String!) {
                repository(owner:$owner, name:$repo) {
                  ref(qualifiedName:$ref) {
                    target {
                      __typename
                      ... on Commit {
                        statusCheckRollup {
                          contexts(first:50) {
                            nodes {
                              __typename
                              ... on CheckRun {
                                name
                                status
                                conclusion
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }' \
              -F owner='${{ github.repository_owner }}' \
              -F repo='${{ github.event.repository.name }}' \
              -F ref='refs/heads/main')

            STATUS=$(echo "$RESPONSE" | jq -r '.data.repository.ref.target.statusCheckRollup.contexts.nodes[] | select(.name=="CodeQL") | .status' | head -1)
            CONCLUSION=$(echo "$RESPONSE" | jq -r '.data.repository.ref.target.statusCheckRollup.contexts.nodes[] | select(.name=="CodeQL") | .conclusion' | head -1)

            if [ -n "$STATUS" ] && [ "$STATUS" != "null" ]; then
              echo "[${i}/36] CodeQL status=${STATUS} conclusion=${CONCLUSION}"
              if [ "$STATUS" = "COMPLETED" ]; then
                if [ "$CONCLUSION" = "SUCCESS" ]; then
                  exit 0
                fi

                echo "::error::CodeQL published a blocking result: ${CONCLUSION}."
                exit 1
              fi
            fi

            echo "[${i}/36] CodeQL result not published yet."
            sleep 10
          done

          echo "::error::Timed out waiting for the published CodeQL result."
          exit 1

  preview-validation:
    name: "Preview, Functional Tests, and DAST"
    needs: [ci, sast, sca, code-scanning-gate]
    if: needs.ci.result == 'success' && needs.sast.result == 'success' && needs.sca.result == 'success' && needs.code-scanning-gate.result == 'success'
    uses: ./.github/workflows/preview.yml
    with:
      branch: main
    secrets: inherit
