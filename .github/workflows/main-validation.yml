name: "Main - Validation Pipeline"

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pom.xml"
      - ".devcontainer/**"
      - ".github/workflows/**"
      - ".github/dependabot.yml"

permissions:
  actions: read
  checks: write
  contents: read
  security-events: write

jobs:
  ci:
    name: "CI"
    uses: ./.github/workflows/ci.yml

  sast:
    name: "SAST"
    uses: ./.github/workflows/sast.yml

  sca:
    name: "SCA"
    uses: ./.github/workflows/sca.yml

  preview-validation:
    name: "Preview, Functional Tests, and DAST"
    needs: [ci, sast, sca]
    if: needs.ci.result == 'success' && needs.sast.result == 'success' && needs.sca.result == 'success'
    uses: ./.github/workflows/preview.yml
    with:
      branch: main
    secrets: inherit
